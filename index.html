<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UserBase — People Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f11;
      --surface:  #18181c;
      --surface2: #222228;
      --border:   #2e2e38;
      --accent:   #f0a500;
      --accent2:  #ff6b35;
      --text:     #e8e8f0;
      --muted:    #7a7a92;
      --danger:   #e05555;
      --success:  #3ecf8e;
      --radius:   14px;
      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 32px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 8px var(--accent); }
      50%       { box-shadow: 0 0 20px var(--accent); }
    }
    .header-sub { color: var(--muted); font-size: 13px; font-weight: 300; letter-spacing: 0.05em; }

    /* BUTTON */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 8px; border: none;
      font-family: var(--font-body); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.18s ease;
    }
    .btn-primary { background: var(--accent); color: #0f0f11; }
    .btn-primary:hover { background: #f5b832; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,165,0,0.3); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--muted); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid transparent; }
    .btn-danger:hover { background: rgba(224,85,85,0.12); border-color: var(--danger); }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

    /* TOOLBAR */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; max-width: 340px; }
    .search-wrap svg { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .search-input {
      width: 100%; padding: 10px 14px 10px 40px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-family: var(--font-body); font-size: 14px;
      transition: border-color 0.15s;
    }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    /* STATS */
    .stats-row { display: flex; gap: 16px; margin-bottom: 36px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 24px; flex: 1; min-width: 140px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .stat-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; }
    .stat-value.amber  { color: var(--accent); }
    .stat-value.orange { color: var(--accent2); }
    .stat-value.green  { color: var(--success); }

    /* GRID */
    .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

    /* CARD */
    .user-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: all 0.22s ease;
      animation: cardIn 0.35s ease backwards;
      position: relative;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .user-card:hover { border-color: rgba(240,165,0,0.4); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    .card-accent-bar { height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .card-body { padding: 24px; }
    .card-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
    .avatar { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; object-fit: cover; border: 2px solid var(--border); }
    .avatar-placeholder {
      width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface2); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 700; font-size: 20px; color: var(--accent);
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .card-email { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-id-badge { position: absolute; top: 14px; right: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; font-size: 11px; color: var(--muted); font-weight: 500; }
    .card-bio { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 18px; font-style: italic; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-bio.empty { color: rgba(122,122,146,0.45); }
    .card-meta { font-size: 11px; color: var(--muted); margin-bottom: 18px; display: flex; align-items: center; gap: 6px; }
    .card-actions { display: flex; gap: 8px; }

    /* EMPTY */
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
    .empty-title { font-family: var(--font-display); font-size: 20px; margin-bottom: 8px; }
    .empty-sub { color: var(--muted); font-size: 14px; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
      width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-header { padding: 28px 28px 0; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; }
    .modal-close { width: 34px; height: 34px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .modal-close:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    .modal-body { padding: 0 28px 28px; }

    /* FORM */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-label .req { color: var(--accent); margin-left: 2px; }
    .form-input, .form-textarea { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-family: var(--font-body); font-size: 14px; transition: border-color 0.15s; }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(240,165,0,0.12); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
    .form-textarea { resize: vertical; min-height: 90px; }

    /* AVATAR UPLOAD */
    .avatar-upload-wrap { display: flex; align-items: center; gap: 20px; }
    .avatar-preview-lg {
      width: 80px; height: 80px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface2); border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-size: 30px; color: var(--muted); transition: border-color 0.2s;
    }
    .avatar-preview-lg img { width: 100%; height: 100%; object-fit: cover; }
    .upload-area { flex: 1; cursor: pointer; background: var(--surface2); border: 1px dashed var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; transition: all 0.15s; }
    .upload-area:hover, .upload-area.drag { border-color: var(--accent); background: rgba(240,165,0,0.05); }
    .upload-area input { display: none; }
    .upload-area .up-label { font-size: 13px; color: var(--muted); }
    .upload-area .up-label strong { color: var(--accent); }
    .upload-area .up-hint { font-size: 11px; color: var(--muted); opacity: 0.7; margin-top: 3px; }
    .upload-area .up-name { font-size: 13px; color: var(--success); margin-top: 4px; font-weight: 500; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 28px; }

    /* DETAIL */
    .detail-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); box-shadow: 0 0 24px rgba(240,165,0,0.25); }
    .detail-placeholder { width: 100px; height: 100px; border-radius: 50%; background: var(--surface2); border: 3px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 36px; font-weight: 700; color: var(--accent); }
    .detail-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .detail-name { font-family: var(--font-display); font-size: 24px; font-weight: 800; }
    .detail-email { color: var(--muted); font-size: 14px; }
    .detail-row { display: flex; gap: 8px; font-size: 13px; color: var(--muted); margin-top: 12px; align-items: center; }
    .detail-row span:last-child { color: var(--text); }
    .detail-bio { margin-top: 12px; font-size: 14px; color: var(--muted); font-style: italic; line-height: 1.6; }
    .detail-actions { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    /* CONFIRM */
    .confirm-modal .modal-body { text-align: center; }
    .confirm-icon { font-size: 44px; margin-bottom: 12px; }
    .confirm-text { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .confirm-text strong { color: var(--text); }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }

    /* TOAST */
    .toast-container { position: fixed; bottom: 28px; right: 28px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
    .toast { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: toastIn 0.3s ease; min-width: 260px; max-width: 360px; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--danger); }
    .toast.success .toast-icon { color: var(--success); }
    .toast.error   .toast-icon { color: var(--danger); }
    .toast-icon { font-size: 18px; flex-shrink: 0; }
    .toast-msg { flex: 1; line-height: 1.4; }
    .toast-close { color: var(--muted); cursor: pointer; font-size: 16px; }
    .toast-close:hover { color: var(--text); }

    /* SKELETON */
    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; animation: shimmer 1.6s ease-in-out infinite; }
    .skel { background: var(--surface2); border-radius: 6px; }
    .skel-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--surface2); }
    .skel-line { height: 12px; background: var(--surface2); border-radius: 4px; margin-bottom: 8px; }
    @keyframes shimmer { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

    /* PAGINATION */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 40px; }
    .page-btn { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 14px; transition: all 0.15s; }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); color: #0f0f11; border-color: var(--accent); font-weight: 700; }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 600px) {
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: 100%; }
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div>
      <div class="logo"><div class="logo-dot"></div>UserBase</div>
      <div class="header-sub">People Directory · FastAPI CRUD</div>
    </div>
    <button class="btn btn-primary" id="openCreateBtn">＋ New User</button>
  </header>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value amber" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">With Photo</div><div class="stat-value orange" id="statWithPhoto">—</div></div>
    <div class="stat-card"><div class="stat-label">No Photo</div><div class="stat-value green" id="statNoPhoto">—</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search by name or email…" />
    </div>
    <button class="btn btn-ghost btn-sm" id="refreshBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>
  </div>

  <div id="mainContent">
    <div class="skeleton-grid" id="skeletonGrid"></div>
    <div class="users-grid" id="usersGrid" style="display:none;"></div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- CREATE / EDIT MODAL -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="formModalTitle">New User</div>
      <button class="modal-close" id="formModalClose">✕</button>
    </div>
    <div class="modal-body">
      <form id="userForm" autocomplete="off">
        <input type="hidden" id="editUserId" />
        <div class="form-group">
          <label class="form-label">Profile Picture</label>
          <div class="avatar-upload-wrap">
            <div class="avatar-preview-lg" id="avatarPreview"><span>👤</span></div>
            <label class="upload-area" id="uploadArea">
              <input type="file" id="pictureInput" accept="image/jpeg,image/png,image/gif,image/webp" />
              <div class="up-label"><strong>Click to upload</strong> or drag &amp; drop</div>
              <div class="up-hint">JPEG, PNG, GIF, WebP · Max 5 MB</div>
              <div class="up-name" id="fileName" style="display:none;"></div>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="inputName">Full Name <span class="req">*</span></label>
          <input class="form-input" id="inputName" type="text" placeholder="e.g. Jane Doe" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="inputEmail">Email Address <span class="req">*</span></label>
          <input class="form-input" id="inputEmail" type="email" placeholder="jane@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="inputBio">Bio</label>
          <textarea class="form-textarea" id="inputBio" placeholder="A short bio…"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="formCancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="formSubmitBtn">
            <span id="formSubmitLabel">Create User</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">User Profile</div>
      <button class="modal-close" id="detailModalClose">✕</button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay confirm-modal" id="deleteModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <div class="modal-title">Delete User</div>
      <button class="modal-close" id="deleteModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="confirm-icon">🗑️</div>
      <p class="confirm-text">Are you sure you want to delete <strong id="deleteUserName"></strong>? This cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn-ghost" id="deleteCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="deleteConfirmBtn">Yes, Delete</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:8000';
  const PAGE_SIZE = 9;
  let allUsers = [], filteredUsers = [], currentPage = 1, editingId = null, deletingId = null;

  const $ = id => document.getElementById(id);
  const usersGrid = $('usersGrid'), skeletonGrid = $('skeletonGrid'), pagination = $('pagination'), searchInput = $('searchInput');

  function showSkeletons(n = 6) {
    skeletonGrid.style.display = 'grid';
    usersGrid.style.display = 'none';
    skeletonGrid.innerHTML = Array.from({ length: n }, () => `
      <div class="skeleton-card">
        <div style="display:flex;gap:16px;margin-bottom:16px;align-items:center;">
          <div class="skel skel-avatar"></div>
          <div style="flex:1;"><div class="skel skel-line" style="width:70%;"></div><div class="skel skel-line" style="width:50%;"></div></div>
        </div>
        <div class="skel skel-line" style="width:90%;"></div><div class="skel skel-line" style="width:60%;"></div>
      </div>`).join('');
  }

  async function loadUsers() {
    showSkeletons();
    try {
      const res = await fetch(`${API}/users/?limit=200`);
      if (!res.ok) throw new Error('Failed');
      allUsers = await res.json();
      applyFilter(); updateStats();
    } catch {
      toast(`Could not connect. Is the FastAPI server running at ${API}?`, 'error');
      skeletonGrid.style.display = 'none';
      usersGrid.style.display = 'grid';
      usersGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Connection Failed</div><div class="empty-sub">Start your server: <code>uvicorn main:app --reload</code></div></div>`;
    }
  }

  function updateStats() {
    const w = allUsers.filter(u => u.profile_picture).length;
    $('statTotal').textContent = allUsers.length;
    $('statWithPhoto').textContent = w;
    $('statNoPhoto').textContent = allUsers.length - w;
  }

  function applyFilter() {
    const q = searchInput.value.trim().toLowerCase();
    filteredUsers = q ? allUsers.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)) : [...allUsers];
    currentPage = 1; renderPage();
  }

  function renderPage() {
    skeletonGrid.style.display = 'none';
    usersGrid.style.display = 'grid';
    const pageUsers = filteredUsers.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
    if (!filteredUsers.length) {
      usersGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">${searchInput.value ? 'No results' : 'No users yet'}</div><div class="empty-sub">${searchInput.value ? 'Try a different search.' : 'Click "New User" to add the first one.'}</div></div>`;
      renderPagination(0); return;
    }
    usersGrid.innerHTML = pageUsers.map(userCard).join('');
    renderPagination(filteredUsers.length);
    document.querySelectorAll('.view-btn').forEach(b => b.addEventListener('click', () => openDetail(+b.dataset.id)));
    document.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => openEdit(+b.dataset.id)));
    document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', () => openDelete(+b.dataset.id)));
  }

  function userCard(u, i) {
    const init = u.name.charAt(0).toUpperCase();
    const av = u.profile_picture
      ? `<img class="avatar" src="data:${u.profile_picture_mime};base64,${u.profile_picture}" alt="${esc(u.name)}" />`
      : `<div class="avatar-placeholder">${init}</div>`;
    const date = u.created_at ? new Date(u.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
    return `<div class="user-card" style="animation-delay:${i*0.05}s">
      <div class="card-accent-bar"></div>
      <div class="card-body">
        <span class="card-id-badge">#${u.id}</span>
        <div class="card-header">${av}<div class="card-info"><div class="card-name">${esc(u.name)}</div><div class="card-email">${esc(u.email)}</div></div></div>
        <div class="card-bio ${u.bio?'':'empty'}">${u.bio ? esc(u.bio) : 'No bio provided.'}</div>
        <div class="card-meta"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${date}</div>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm view-btn" data-id="${u.id}">View</button>
          <button class="btn btn-ghost btn-sm edit-btn" data-id="${u.id}">Edit</button>
          <button class="btn btn-danger btn-sm delete-btn" data-id="${u.id}">Delete</button>
        </div>
      </div></div>`;
  }

  function renderPagination(total) {
    const pages = Math.ceil(total / PAGE_SIZE);
    if (pages <= 1) { pagination.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for (let p = 1; p <= pages; p++) html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
    pagination.innerHTML = html;
  }

  window.goPage = p => {
    const pages = Math.ceil(filteredUsers.length / PAGE_SIZE);
    if (p < 1 || p > pages) return;
    currentPage = p; renderPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  function openDetail(id) {
    const u = allUsers.find(x => x.id === id); if (!u) return;
    const init = u.name.charAt(0).toUpperCase();
    const av = u.profile_picture
      ? `<img class="detail-avatar" src="data:${u.profile_picture_mime};base64,${u.profile_picture}" alt="${esc(u.name)}" />`
      : `<div class="detail-placeholder">${init}</div>`;
    const created = u.created_at ? new Date(u.created_at).toLocaleString() : '—';
    const updated = u.updated_at ? new Date(u.updated_at).toLocaleString() : 'Never';
    $('detailModalBody').innerHTML = `
      <div class="detail-header">${av}<div><div class="detail-name">${esc(u.name)}</div><div class="detail-email">${esc(u.email)}</div></div></div>
      ${u.bio ? `<div class="detail-bio">"${esc(u.bio)}"</div>` : ''}
      <div class="detail-row"><span>ID</span><span>#${u.id}</span></div>
      <div class="detail-row"><span>Created</span><span>${created}</span></div>
      <div class="detail-row"><span>Updated</span><span>${updated}</span></div>
      <div class="detail-row"><span>Picture</span><span>${u.profile_picture ? u.profile_picture_mime : 'None'}</span></div>
      <div class="detail-actions">
        <button class="btn btn-primary btn-sm" onclick="openEdit(${u.id});closeModal('detailModal')">Edit User</button>
        ${u.profile_picture ? `<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="removePicture(${u.id})">Remove Picture</button>` : ''}
      </div>`;
    openModal('detailModal');
  }

  function openCreate() {
    editingId = null;
    $('formModalTitle').textContent = 'New User';
    $('formSubmitLabel').textContent = 'Create User';
    $('userForm').reset(); resetAvatarPreview();
    openModal('formModal');
  }

  window.openEdit = function(id) {
    const u = allUsers.find(x => x.id === id); if (!u) return;
    editingId = id;
    $('formModalTitle').textContent = 'Edit User';
    $('formSubmitLabel').textContent = 'Save Changes';
    $('inputName').value  = u.name;
    $('inputEmail').value = u.email;
    $('inputBio').value   = u.bio || '';
    $('editUserId').value = u.id;
    if (u.profile_picture) {
      $('avatarPreview').innerHTML = `<img src="data:${u.profile_picture_mime};base64,${u.profile_picture}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`;
    } else resetAvatarPreview();
    openModal('formModal');
  };

  function resetAvatarPreview() {
    $('avatarPreview').innerHTML = '<span>👤</span>';
    $('fileName').style.display = 'none';
    $('pictureInput').value = '';
  }

  $('userForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = $('formSubmitBtn'); btn.disabled = true;
    const fd = new FormData();
    fd.append('name',  $('inputName').value.trim());
    fd.append('email', $('inputEmail').value.trim());
    const bio = $('inputBio').value.trim();
    if (bio) fd.append('bio', bio);
    const file = $('pictureInput').files[0];
    if (file) fd.append('profile_picture', file);
    try {
      const res = await fetch(editingId ? `${API}/users/${editingId}` : `${API}/users/`, { method: editingId ? 'PUT' : 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Request failed');
      closeModal('formModal');
      toast(editingId ? `${data.name} updated!` : `${data.name} created!`, 'success');
      await loadUsers();
    } catch (err) { toast(err.message, 'error'); }
    finally { btn.disabled = false; }
  });

  function openDelete(id) {
    const u = allUsers.find(x => x.id === id); if (!u) return;
    deletingId = id;
    $('deleteUserName').textContent = u.name;
    openModal('deleteModal');
  }

  $('deleteConfirmBtn').addEventListener('click', async () => {
    if (!deletingId) return;
    $('deleteConfirmBtn').disabled = true;
    try {
      const res = await fetch(`${API}/users/${deletingId}`, { method: 'DELETE' });
      if (res.status !== 204) { const d = await res.json(); throw new Error(d.detail); }
      closeModal('deleteModal');
      toast('User deleted', 'success');
      await loadUsers();
    } catch (err) { toast(err.message, 'error'); }
    finally { $('deleteConfirmBtn').disabled = false; }
  });

  window.removePicture = async function(id) {
    try {
      const res = await fetch(`${API}/users/${id}/picture`, { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      closeModal('detailModal');
      toast('Profile picture removed', 'success');
      await loadUsers();
    } catch (err) { toast(err.message, 'error'); }
  };

  function openModal(id)  { $(id).classList.add('open'); }
  function closeModal(id) { $(id).classList.remove('open'); }
  window.closeModal = closeModal;

  ['formModal','detailModal','deleteModal'].forEach(id => {
    $(id).addEventListener('click', e => { if (e.target === $(id)) closeModal(id); });
  });
  $('formModalClose').addEventListener('click',   () => closeModal('formModal'));
  $('formCancelBtn').addEventListener('click',    () => closeModal('formModal'));
  $('detailModalClose').addEventListener('click', () => closeModal('detailModal'));
  $('deleteModalClose').addEventListener('click', () => closeModal('deleteModal'));
  $('deleteCancelBtn').addEventListener('click',  () => closeModal('deleteModal'));
  $('openCreateBtn').addEventListener('click',    openCreate);
  $('refreshBtn').addEventListener('click',       loadUsers);
  searchInput.addEventListener('input', applyFilter);

  const pictureInput = $('pictureInput'), uploadArea = $('uploadArea');
  pictureInput.addEventListener('change', () => {
    const file = pictureInput.files[0]; if (!file) return;
    $('fileName').textContent = file.name; $('fileName').style.display = 'block';
    const r = new FileReader();
    r.onload = e => { $('avatarPreview').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`; };
    r.readAsDataURL(file);
  });
  uploadArea.addEventListener('dragover',  e => { e.preventDefault(); uploadArea.classList.add('drag'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault(); uploadArea.classList.remove('drag');
    const file = e.dataTransfer.files[0]; if (!file) return;
    const dt = new DataTransfer(); dt.items.add(file);
    pictureInput.files = dt.files; pictureInput.dispatchEvent(new Event('change'));
  });

  function toast(msg, type = 'success') {
    const c = $('toastContainer'), el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span class="toast-icon">${type==='success'?'✓':'✕'}</span><span class="toast-msg">${msg}</span><span class="toast-close" onclick="this.parentElement.remove()">✕</span>`;
    c.appendChild(el); setTimeout(() => el.remove(), 4000);
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  loadUsers();
</script>
</body>
</html>
